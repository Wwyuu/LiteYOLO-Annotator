<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOLO标注工具</title>
  <link rel="stylesheet" href="/static/editor.css?v=6" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>YOLO标注工具</h1>
        <div class="meta" id="dirs"></div>
        <input id="search" type="search" placeholder="搜索图片名..." />
        <select id="filter">
          <option value="all">全部</option>
          <option value="labeled">有标注</option>
          <option value="empty">无标注</option>
          <option value="edited">已编辑</option>
        </select>
        <div class="meta" id="edit-summary"></div>
      </div>
      <div id="image-list"></div>
    </aside>

    <main id="main">
      <div id="toolbar">
        <button id="btn-prev" title="上一张 (←)">← 上一张</button>
        <button id="btn-next" title="下一张 (→)">下一张 →</button>
        <button id="btn-mode-select" class="active" title="选择/移动/缩放框 (V)">选择</button>
        <button id="btn-mode-draw" title="框选新标注 (R)">框选</button>
        <select id="class-select" title="当前类别"></select>
        <button id="btn-delete" title="删除选中框 (Delete)">删除框</button>
        <button id="btn-save" title="保存 (Ctrl+S)">保存</button>
        <button id="btn-fit" title="适应窗口 (F)">适应</button>
        <button id="btn-zoom-in" title="放大 (+)">+</button>
        <button id="btn-zoom-out" title="缩小 (-)">-</button>
        <span id="status">就绪</span>
      </div>

      <div id="canvas-wrap">
        <img id="bg-image" alt="" draggable="false" />
        <canvas id="editor-canvas"></canvas>
        <div id="hint">
          快捷键：V 选择 | R 框选 | Del 删除 | Ctrl+S 保存 | ←/→ 切换 | 滚轮缩放 | 空格+拖拽平移
        </div>
      </div>
    </main>
  </div>

  <div id="toast"></div>
  <script src="/static/editor.js?v=5"></script>
</body>
</html>
